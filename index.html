  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noteable</title>
  <link rel="stylesheet" href="styles.css" />
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Noteable</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <div class="topbar" aria-label="Language">
      <label class="language-control"><span data-i18n="languageLabel">Език</span>
        <select id="languageSelect" aria-label="Language">
          <option value="bg">Български</option>
          <option value="en">English</option>
        </select>
      </label>
    </div>

    <section id="menuScreen" class="screen active" aria-labelledby="appTitle">
      <div class="menu-card">
        <div class="brand-lockup">
          <img class="brand-logo" src="assets/logo.png" alt="Noteable logo" />
          <h1 id="appTitle">Noteable</h1>
        </div>
        <p class="intro" data-i18n="intro">Добре дошъл в Noteable — игра за разпознаване на ноти, тоналности, интервали и музикални символи.<br />Избери с кой режим искаш да започнеш.</p>
        <h2 data-i18n="chooseMode">Избери начален режим</h2>
        <div class="menu-buttons" role="group" aria-label="Начален режим">
          <button class="primary-btn" data-start-mode="notes" data-i18n="modeNotes">Ноти</button>
          <button class="primary-btn" data-start-mode="keys" data-i18n="modeKeys">Тоналности</button>
          <button class="primary-btn" data-start-mode="intervals" data-i18n="modeIntervals">Интервали</button>
          <button class="primary-btn" data-start-mode="symbols" data-i18n="modeSymbols">Музикални символи</button>
        </div>
      </div>
    </section>

    <section id="gameScreen" class="screen" aria-label="Игра Noteable">
      <div class="game-brand">
        <img class="game-logo" src="assets/logo.png" alt="Noteable logo" />
        <span>Noteable</span>
        <div id="message" class="message brand-message" aria-live="polite"></div>
      </div>
      <div class="game-layout">
        <div class="stage-column">
          <canvas id="musicCanvas" width="640" height="260" aria-label="Музикален пример"></canvas>
          <div class="interval-tools">
            <button id="playIntervalBtn" class="primary-btn play-interval" data-i18n="playInterval" hidden>Пусни</button>
          </div>
          <div id="pianoClip" class="piano-clip" hidden></div>
          <div id="prompt" class="prompt"></div>
          <div id="answers" class="answers"></div>
        </div>

        <aside class="side-panel" aria-label="Резултат и настройки">
          <div class="score-card">
            <div id="correctLabel" class="score correct">Верни: 0</div>
            <div id="wrongLabel" class="score wrong">Грешни: 0</div>
            <div id="successLabel" class="score success">Успеваемост: 0%</div>
            <div id="streakLabel" class="score streak">Streak: 0</div>
          </div>
          <div class="action-grid">
            <button id="resetBtn" class="primary-btn" data-i18n="reset">Reset</button>
            <button id="nextBtn" class="primary-btn" data-i18n="next">Следващ</button>
          </div>
          <button id="mainMenuBtn" class="primary-btn full" data-i18n="mainMenu">Към main menu</button>

          <fieldset class="settings">
            <legend data-i18n="settings">Настройки</legend>
            <label><span data-i18n="modeLabel">Режим</span>
              <select id="modeSelect">
                <option value="notes" data-i18n="modeNotes">Ноти</option>
                <option value="keys" data-i18n="modeKeys">Тоналности</option>
                <option value="intervals" data-i18n="modeIntervals">Интервали</option>
                <option value="symbols" data-i18n="modeSymbols">Музикални символи</option>
              </select>
            </label>
            <label><span data-i18n="noteNames">Имена на ноти</span>
              <select id="namingSelect">
                <option value="letter">C D E F G A B</option>
                <option value="solfege">Do Re Mi Fa Sol La Si</option>
              </select>
            </label>
            <label><span data-i18n="clefLabel">Ключ</span>
              <select id="clefSelect">
                <option value="treble" data-i18n="treble">Сол</option>
                <option value="bass" data-i18n="bass">Фа</option>
                <option value="both" selected data-i18n="bothClefs">И двете</option>
              </select>
            </label>
            <label><span data-i18n="tonalityLabel">Маж/Мин</span>
              <select id="tonalitySelect">
                <option value="major" selected data-i18n="major">Мажор</option>
                <option value="minor" data-i18n="minor">Минор</option>
              </select>
            </label>
            <label><span data-i18n="familyLabel">Диези/Бемоли</span>
              <select id="familySelect">
                <option value="both" data-i18n="bothFamilies">И диези, и бемоли</option>
                <option value="sharps" data-i18n="sharpsOnly">Само диези</option>
                <option value="flats" data-i18n="flatsOnly">Само бемоли</option>
              </select>
            </label>
            <div class="inline-controls">
              <label><span data-i18n="upToSigns">До колко знака</span>
                <input id="signsInput" type="number" min="0" max="7" value="7" inputmode="numeric" />
              </label>
              <label class="check-label"><input id="accidentalsCheck" type="checkbox" checked /> <span data-i18n="accidentals">Алт.</span></label>
            </div>
          </fieldset>
          <button id="helpBtn" class="primary-btn help-button" data-i18n="help">Помощ</button>
        </aside>
      </div>
    </section>
  </main>

  <nav class="social-links" aria-label="Социални медии">
    <a class="social-btn instagram" href="https://www.instagram.com/noteable_game?igsh=ZWhsN2R6bWRkcmZx" target="_blank" rel="noopener noreferrer" aria-label="Instagram">IG</a>
    <a class="social-btn facebook" href="https://www.facebook.com/share/1CSd4UNn57/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">f</a>
  </nav>

  <dialog id="helpDialog" class="help-dialog">
    <div class="dialog-header">
      <h2 data-i18n="help">Помощ</h2>
      <button id="closeHelpTop" class="icon-btn" aria-label="Затвори">×</button>
    </div>
    <div class="help-images">
      <img src="assets/help_circle.png" alt="Кръг на тоналностите" />
      <img src="assets/help_staff.png" alt="Ноти върху петолиние" />
    </div>
    <div class="dialog-actions">
      <button id="closeHelpBtn" class="primary-btn" data-i18n="back">Назад</button>
    </div>
  </dialog>

  <div id="streakPopup" class="streak-popup" role="status" aria-live="polite" hidden>
    <button id="closeStreakPopup" class="streak-close" aria-label="Close">×</button>
    <div class="streak-icon">🔥</div>
    <div class="streak-title" data-i18n="streakPopupTitle">Streak</div>
    <div id="streakPopupText" class="streak-popup-text"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
